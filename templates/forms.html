<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Gerar Proposta Comercial</title>
  </head>
  <body>
    <h1>Proposta Comercial</h1>

    <form method="post">
      <label>Empresa:</label><br />
      <input type="text" name="empresa" required /><br /><br />

      <label>CNPJ:</label><br />
      <input type="text" name="cnpj" required /><br /><br />

      <label>Contato:</label><br />
      <input type="text" name="contato" /><br /><br />

      <label>Telefone:</label><br />
      <input type="text" name="telefone" /><br /><br />

      <label>Linha do Produto</label>
      <select id="linha" name="linha" required>
        <option value="">Selecione</option>
        <option value="TM2500">TM2500 – Transpalete Manual 2.500 kg</option>
        <option value="TM3000">TM3000 – Transpalete Manual 3.000 kg</option>
      </select>

      <label>Rodagem</label>
      <select id="rodagem" name="rodagem" disabled required>
        <option value="">Selecione</option>
      </select>

      <label>Material da Roda</label>
      <select id="material" name="material" disabled required>
        <option value="">Selecione</option>
      </select>

      <label>Largura do Garfo</label>
      <select id="largura_garfo" name="largura_garfo" disabled required>
        <option value="">Selecione</option>
        <option value="525">525 mm</option>
        <option value="680">680 mm</option>
      </select>


      <label>Desconto (R$)</label>
      <input type="number" step="0.01" name="desconto" placeholder="Opcional" />

      <label>Frete (R$)</label>
      <input type="number" step="0.01" name="frete" placeholder="Opcional" />

      <label>Vendedor responsável:</label><br />
      <input type="text" name="vendedor" required /><br /><br />

      <button type="submit">Gerar Proposta</button>
    </form>

    <script>
      const configuracao = {
        TM2500: {
          rodagens: ["Simples", "Dupla"],
          materiais: ["Nylon", "Poliuretano"],
        },
        TM3000: {
          rodagens: ["Dupla"],
          materiais: ["Nylon", "Poliuretano"],
        },
      };

      const linha = document.getElementById("linha");
      const rodagem = document.getElementById("rodagem");
      const material = document.getElementById("material");
      const largura = document.getElementById("largura_garfo");

      linha.addEventListener("change", () => {
        rodagem.innerHTML = '<option value="">Selecione</option>';
        material.innerHTML = '<option value="">Selecione</option>';

        if (!linha.value) return;

        configuracao[linha.value].rodagens.forEach((r) => {
          rodagem.innerHTML += `<option value="${r}">${r}</option>`;
        });

        rodagem.disabled = false;
      });

      rodagem.addEventListener("change", () => {
        material.innerHTML = '<option value="">Selecione</option>';

        if (!rodagem.value) return;

        configuracao[linha.value].materiais.forEach((m) => {
          material.innerHTML += `<option value="${m}">${m}</option>`;
        });

        material.disabled = false;
      });

      material.addEventListener("change", () => {
        largura.disabled = false;
      });
    </script>
  </body>
</html>
